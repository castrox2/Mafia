<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Mafia Local – Room Test</title>

    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        max-width: 700px;
      }

      .row {
        margin-bottom: 10px;
      }

      input {
        padding: 6px;
        margin-right: 6px;
      }

      button {
        padding: 6px 12px;
        margin-right: 6px;
      }

      ul {
        padding-left: 18px;
      }

      #status {
        margin-top: 10px;
        font-weight: bold;
      }

      #qrWrap {
        margin-top: 12px;
      }

      #qrWrap img {
        margin-top: 8px;
        width: 220px;
        height: 220px;
        image-rendering: pixelated;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      #joinUrl {
        margin-top: 6px;
        font-size: 12px;
        word-break: break-all;
        opacity: 0.9;
      }
    </style>
  </head>

  <body>
    <h1>Mafia Local – Room Test</h1>

    <!-- Player name + room code -->
    <div class="row">
      <input id="name" type="text" placeholder="Your name" />
      <input id="room" type="text" placeholder="Room code (e.g. ABCD)" />
    </div>

    <!-- Controls -->
    <div class="row">
      <button id="createBtn">Create Room</button>
      <button id="joinBtn">Join Room</button>
      <button id="leaveBtn">Leave Room</button>
    </div>

    <div id="status"></div>

    <div id="qrWrap"></div>

    <h3>Players in room:</h3>
    <ul id="players"></ul>

    <!-- Socket.IO client -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const socket = io()
        let currentRoom = ""

        const nameInput = document.getElementById("name")
        const roomInput = document.getElementById("room")
        const playersList = document.getElementById("players")
        const joinBtn = document.getElementById("joinBtn")
        const leaveBtn = document.getElementById("leaveBtn")
        const createBtn = document.getElementById("createBtn")
        const status = document.getElementById("status")
        const qrWrap = document.getElementById("qrWrap")

        if (
          !nameInput ||
          !roomInput ||
          !playersList ||
          !joinBtn ||
          !leaveBtn ||
          !createBtn ||
          !status ||
          !qrWrap
        ) {
          console.error("Missing required HTML elements")
          return
        }

        function renderPlayers(players) {
          playersList.innerHTML = ""
          players.forEach((p) => {
            const li = document.createElement("li")
            li.textContent = p.name
            playersList.appendChild(li)
          })
        }

        function setStatus(text) {
          status.textContent = text
        }

        function clearQr() {
          qrWrap.innerHTML = ""
        }

        socket.on("connect", () => {
          setStatus("Connected ✅")
        })

        // Create room
        createBtn.addEventListener("click", () => {
          const playerName = nameInput.value.trim()
          if (!playerName) {
            alert("Enter your name first.")
            return
          }

          // IMPORTANT: QR will use whatever origin you opened this page with.
          // If you opened with localhost, phones won't be able to use it.
          socket.emit("createRoom", {
            playerName,
            baseUrl: window.location.origin,
          })
        })

        // Join room
        joinBtn.addEventListener("click", () => {
          const playerName = nameInput.value.trim()
          const roomId = roomInput.value.trim().toUpperCase()

          if (!playerName || !roomId) {
            alert("Enter a name and room code.")
            return
          }

          currentRoom = roomId
          clearQr()
          socket.emit("joinRoom", { roomId, playerName })
        })

        // Leave room
        leaveBtn.addEventListener("click", () => {
          if (!currentRoom) return
          socket.emit("leaveRoom", currentRoom)
          currentRoom = ""
          playersList.innerHTML = ""
          clearQr()
          setStatus("Left room")
        })

        // Server events
        socket.on("roomCreated", ({ roomId, joinUrl, qrDataUrl }) => {
          currentRoom = roomId
          roomInput.value = roomId
          setStatus(`Room created: ${roomId}`)

          if (qrDataUrl && joinUrl) {
            qrWrap.innerHTML = `
              <div><strong>Scan to join:</strong></div>
              <img src="${qrDataUrl}" alt="Room QR Code" />
              <div id="joinUrl">${joinUrl}</div>
            `
          } else {
            // If server didn't send QR yet, keep it empty
            clearQr()
          }
        })

        socket.on("playerJoined", (players) => {
          renderPlayers(players)
          setStatus(`In room: ${currentRoom}`)
        })

        socket.on("playerLeft", (players) => {
          renderPlayers(players)
        })

        socket.on("roomFull", ({ roomId, max }) => {
          setStatus(`Room ${roomId} is full (max ${max} players).`)
          alert(`Room ${roomId} is full (max ${max} players).`)
        })

        // Optional: clean leave on refresh (helps prevent duplicates)
        window.addEventListener("beforeunload", () => {
          if (currentRoom) socket.emit("leaveRoom", currentRoom)
          socket.disconnect()
        })
      })
    </script>
  </body>
</html>
