<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mafia Local – Room Test</title>

    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        max-width: 600px;
      }

      h1 {
        margin-bottom: 8px;
      }

      .row {
        margin-bottom: 10px;
      }

      input {
        padding: 10px;
        margin-right: 6px;
        font-size: 16px;
      }

      button {
        padding: 10px 12px;
        margin-right: 6px;
        font-size: 16px;
      }

      ul {
        padding-left: 18px;
      }

      #status {
        margin-top: 10px;
        font-weight: bold;
        white-space: pre-wrap;
      }

      #qrWrap {
        margin-top: 12px;
      }

      #qrWrap img {
        margin-top: 8px;
        width: 220px;
        height: 220px;
        border: 1px solid #ddd;
        border-radius: 6px;
      }

      #joinUrl {
        margin-top: 6px;
        font-size: 12px;
        word-break: break-all;
        opacity: 0.9;
      }
    </style>
  </head>

  <body>
    <h1>Mafia Local – Room Test</h1>
    <p>Open this page in multiple tabs/devices and join the same room code.</p>

    <!-- Player name + room code -->
    <div class="row">
      <input id="name" type="text" placeholder="Your name" />
      <input id="room" type="text" placeholder="Room code (e.g. ABCD)" />
    </div>

    <!-- Controls -->
    <div class="row">
      <button id="createBtn" type="button">Create Room</button>
      <button id="joinBtn" type="button">Join Room</button>
      <button id="leaveBtn" type="button">Leave Room</button>
    </div>

    <!-- Test controls -->
    <div class="row">
      <button id="killMeBtn" type="button">Kill Me (test)</button>
      <button id="reviveMeBtn" type="button">Revive Me (test)</button>
      <button id="readyBtn" type="button">Ready (test)</button>
      <button id="notReadyBtn" type="button">Not Ready (test)</button>
    </div>

    <div id="status"></div>

    <!-- QR / Join Link -->
    <div id="qrWrap"></div>

    <h3>Players in room:</h3>
    <ul id="players"></ul>

    <!-- Socket.IO client -->
    <script src="/socket.io/socket.io.js"></script>

    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const socket = io(window.location.origin)

        let currentRoom = ""
        let lastRoomState = null

        const nameInput = document.getElementById("name")
        const roomInput = document.getElementById("room")
        const playersList = document.getElementById("players")
        const joinBtn = document.getElementById("joinBtn")
        const leaveBtn = document.getElementById("leaveBtn")
        const createBtn = document.getElementById("createBtn")
        const killMeBtn = document.getElementById("killMeBtn")
        const reviveMeBtn = document.getElementById("reviveMeBtn")
        const readyBtn = document.getElementById("readyBtn")
        const notReadyBtn = document.getElementById("notReadyBtn")
        const status = document.getElementById("status")
        const qrWrap = document.getElementById("qrWrap")

        function setStatus(text) {
          status.textContent = text
        }

        function clearQr() {
          qrWrap.innerHTML = ""
        }

        function renderPlayers(players, hostId) {
          playersList.innerHTML = ""
          players.forEach((p) => {
            const li = document.createElement("li")
            const hostTag = p.id === hostId ? " (HOST)" : ""
            const deadTag = p.alive ? "" : " (dead)"
            li.textContent = `${p.name}${hostTag}${deadTag} — role: ${p.role} — status: ${p.status}`
            playersList.appendChild(li)
          })
        }

        socket.on("connect", () => {
          setStatus(`Connected ✅ (id: ${socket.id})`)
        })

        socket.on("connect_error", (err) => {
          setStatus(`Connect error: ${err.message}`)
          console.error(err)
        })

        socket.on("disconnect", (reason) => {
          setStatus(`Disconnected: ${reason}`)
        })

        // QR join support: /?room=ABCD
        const params = new URLSearchParams(window.location.search)
        const roomFromQr = (params.get("room") || "").trim().toUpperCase()
        if (roomFromQr) {
          roomInput.value = roomFromQr
          setStatus(`Room code loaded: ${roomFromQr}. Enter your name and press Join.`)
        }

        // Create room
        createBtn.addEventListener("click", () => {
          const playerName = nameInput.value.trim()
          if (!playerName) return alert("Enter your name first.")

          setStatus("Creating room…")

          socket.emit("createRoom", {
            playerName,
            baseUrl: window.location.origin,
          })
        })

        // Join room
        joinBtn.addEventListener("click", () => {
          const playerName = nameInput.value.trim()
          const roomId = roomInput.value.trim().toUpperCase()

          if (!playerName || !roomId) return alert("Enter a name and room code.")

          currentRoom = roomId
          clearQr()
          setStatus(`Joining ${roomId}…`)

          socket.emit("joinRoom", { roomId, playerName })
        })

        // Leave room
        leaveBtn.addEventListener("click", () => {
          if (!currentRoom) return

          socket.emit("leaveRoom", currentRoom)
          currentRoom = ""
          playersList.innerHTML = ""
          clearQr()
          setStatus("Left room")
        })

        // Test: kill / revive self
        killMeBtn.addEventListener("click", () => {
          if (!currentRoom) return alert("Join a room first")
          socket.emit("setAlive", { roomId: currentRoom, playerId: socket.id, alive: false })
        })

        reviveMeBtn.addEventListener("click", () => {
          if (!currentRoom) return alert("Join a room first")
          socket.emit("setAlive", { roomId: currentRoom, playerId: socket.id, alive: true })
        })

        // Test: ready / not-ready
        readyBtn.addEventListener("click", () => {
          if (!currentRoom) return alert("Join a room first")
          socket.emit("setPlayerStatus", { roomId: currentRoom, playerId: socket.id, status: "READY" })
        })

        notReadyBtn.addEventListener("click", () => {
          if (!currentRoom) return alert("Join a room first")
          socket.emit("setPlayerStatus", { roomId: currentRoom, playerId: socket.id, status: "NOT_READY" })
        })

        // Server events
        socket.on("roomCreated", ({ roomId, joinUrl, qrDataUrl }) => {
          currentRoom = roomId
          roomInput.value = roomId
          setStatus(`Room created: ${roomId}\n${joinUrl || ""}`)

          if (qrDataUrl && joinUrl) {
            qrWrap.innerHTML = `
              <div><strong>Scan to join:</strong></div>
              <img src="${qrDataUrl}" alt="Room QR Code" />
              <div id="joinUrl">${joinUrl}</div>
            `
          }
        })

        // Use roomState as the single source of truth
        socket.on("roomState", ({ roomId, hostId, players }) => {
          lastRoomState = { roomId, hostId, players }

          currentRoom = roomId
          roomInput.value = roomId
          renderPlayers(players, hostId)

          const amIHost = socket.id === hostId
          setStatus(`In room: ${roomId}${amIHost ? " (Host)" : ""}`)
        })

        socket.on("roomClosed", ({ roomId }) => {
          if (currentRoom === roomId) {
            currentRoom = ""
            playersList.innerHTML = ""
            clearQr()
            setStatus("Room closed")
          }
        })

        window.addEventListener("beforeunload", () => {
          if (currentRoom) socket.emit("leaveRoom", currentRoom)
          socket.disconnect()
        })
      })
    </script>
  </body>
</html>
